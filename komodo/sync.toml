# CV4PVE Admin Configuration
# Copyright (c) Corsinvest Srl
# Website: https://corsinvest.it
# Repository: https://gitlab.com/Corsinvest/cv4pve-admin

# ==============================================================================
# PostgreSQL Configuration
# ==============================================================================
POSTGRES_DB=cv4pve-admin-db
POSTGRES_USER=postgres

# WARNING: Change this password before deploying to production!
# Generate strong password with: openssl rand -base64 32
POSTGRES_PASSWORD=cv4pve-admin

# ==============================================================================
# Data Directory
# ==============================================================================
# Where to store persistent data (database, backups, logs, etc.)
# Relative path (recommended for portability):
DATA_DIR=./data
#
# Absolute path example:
# DATA_DIR=/path/to/your/data

# ==============================================================================
# Application Version
# ==============================================================================
# Docker image tag to use. Examples: latest, 2.0.0-rc1, 2.0.0
# Check available tags at: https://hub.docker.com/r/corsinvest/cv4pve-admin/tags
CV4PVE_ADMIN_TAG=latest

# ==============================================================================
# Network Ports
# ==============================================================================
# Main application web UI
CV4PVE_ADMIN_PORT=8080

# PgWeb admin interface (only when started with --profile admin)
PGWEB_PORT=8082

# ==============================================================================
# Timezone Configuration
# ==============================================================================
# Set the timezone for the container (e.g., Europe/Rome, America/New_York, UTC)
# This will be automatically used by .NET applications running in the container
TZ=Europe/Rome

# ==============================================================================
# Backup Directory
# ==============================================================================
# Where to store backups (relative to this directory)
BACKUP_DIR=./backups

# ==============================================================================
# Watchtower Configuration
# ==============================================================================
# API token for Watchtower HTTP API (used by cv4pve-admin to trigger updates)
# Generate a secure token with: openssl rand -base64 32
WATCHTOWER_HTTP_API_TOKEN=mySecretToken123
"""

