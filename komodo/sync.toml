file_contents = """
services:
  broker:
    image: docker.io/library/redis:8
    restart: unless-stopped
    volumes:
      - paperless-redisdata:/data
  db:
    image: docker.io/library/mariadb:12
    restart: unless-stopped
    volumes:
      - paperless-dbdata:/var/lib/mysql
    env_file:
      - .env
    #environment:
     #  MARIADB_HOST: paperless
     #  MARIADB_DATABASE: paperless
     #  MARIADB_USER: paperless
     #  MARIADB_PASSWORD: paperless
     #  MARIADB_ROOT_PASSWORD: paperless
  webserver:
    image: ghcr.io/paperless-ngx/paperless-ngx:latest
    restart: unless-stopped
    depends_on:
      - db
      - broker
      - gotenberg
      - tika
    ports:
      - "8101:8000"
    volumes:
      - data:/usr/src/paperless/data
      - media:/usr/src/paperless/media
      - ${ZDATA}/paperless-ngx/export:/usr/src/paperless/export
      #- ${ZDATA}/paperless-ngx/consume:/usr/src/paperless/consume
      - ./consume:/usr/src/paperless/consume
      - ${ZDATA}/paperless-ngx/corp:/usr/src/paperless/corp
    env_file: .env
    environment:
      PAPERLESS_REDIS: redis://broker:6379
      PAPERLESS_DBENGINE: mariadb
      PAPERLESS_DBHOST: db
      PAPERLESS_DBUSER: ${PAPERLESS_DBUSER}
      PAPERLESS_DBPASS: ${PAPERLESS_DBPASS} # only needed if non-default password
      PAPERLESS_DBPORT: 3306
      PAPERLESS_TIKA_ENABLED: 1
      PAPERLESS_TIKA_GOTENBERG_ENDPOINT: http://gotenberg:3000
      PAPERLESS_TIKA_ENDPOINT: http://tika:9998
  gotenberg:
    image: docker.io/gotenberg/gotenberg:8.25
    restart: unless-stopped
    # The gotenberg chromium route is used to convert .eml files. We do not
    # want to allow external content like tracking pixels or even javascript.
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=true"
      - "--chromium-allow-list=file:///tmp/.*"
  tika:
    image: docker.io/apache/tika:latest
    restart: unless-stopped
volumes:
  data:
  media:
  paperless-dbdata:
  paperless-redisdata:
"""
