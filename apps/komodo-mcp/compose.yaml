services:
  komodo-mcp-server:
    image: ${KOMODO_MCP_IMAGE:-ghcr.io/mp-tool/komodo-mcp-server}:${KOMODO_MCP_IMAGE_TAG:-latest}
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    ports:
      - ${KOMODO_MCP_PORT:-8000}:8000

    ## Optional:Resource limits
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'
        reservations:
          memory: 128M
          cpus: '0.1'

    ## Optional: Environment variables from .env injected into container
    ## See ../config/README.md for the full configuration reference
    env_file:
      - .env

    ## Environment variables
    environment:
      ## Set timezone RFC3339 format, e.g. "UTC", "America/New_York"
      TZ: Asia/Singapore 
      ## MCP Server configuration
      MCP_CONFIG_FILE_PATH: ${KOMODO_MCP_CONFIG_PATH:-/app/config.toml}
     #MCP_TRANSPORT: ${KOMODO_MCP_TRANSPORT_MODE:-http}

      ## Komodo Connection
      # KOMODO_URL: ${KOMODO_URL:-https://komodo.example.com:9120}
      # KOMODO_API_KEY: ${KOMODO_API_KEY}
      # KOMODO_API_SECRET: ${KOMODO_API_SECRET}
      ## Alternative:
      # KOMODO_USERNAME: ${KOMODO_USERNAME}
      # KOMODO_PASSWORD: ${KOMODO_PASSWORD}
    
    ## Optional: Mount custom config file
    volumes:
      - ./config.toml:/app/config.toml

    ## Health check - uses /ready for accurate container status
    ## Returns: 200 (ready), 503 (Komodo disconnected), 429 (overloaded)
    ## Was build in the image, but can be overridden here if needed
    # healthcheck:
    #   test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8000/ready').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 10s