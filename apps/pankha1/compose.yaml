# Docker Compose for Pankha Repository
# run:
# docker compose down && docker compose pull && docker compose up -d

services:
  pankha-app:
    container_name: pankha_app
    image: anexgohan/pankha:latest # :latest = stable | :beta = absolute latest | :testing = pre-release
    # Log rotation: managed by your Docker daemon config (/etc/docker/daemon.json)
    ports:
      - "${PANKHA_PORT:-3143}:3143" # Web server (host:container) (change left side only, set to your desired port, or set PANKHA_PORT environment variable)
    environment:
      # Timezone: set TIMEZONE in .env (list: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones)
      - TZ=${TIMEZONE:-UTC}
      - PORT=3143 # Internal port Do Not Change
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3143/health"]
      interval: 15s
      timeout: 10s
      retries: 3
    depends_on:
      pankha-postgres:
        condition: service_healthy
    volumes:
      - ./docker-data/staging:${PANKHA_STAGING_DIR}
    restart: unless-stopped

  pankha-postgres:
    container_name: pankha_postgres
    image: postgres:18-alpine
    command:
      - "postgres"
      - "-c"
      - "max_wal_size=${POSTGRES_MAX_WAL_SIZE:-256MB}"
      - "-c"
      - "min_wal_size=${POSTGRES_MIN_WAL_SIZE:-80MB}"
      - "-c"
      - "checkpoint_timeout=${POSTGRES_CHECKPOINT_TIMEOUT:-5min}"
      - "-c"
      - "wal_keep_size=${POSTGRES_WAL_KEEP_SIZE:-128MB}"
      - "-c"
      # PostgreSQL logging: only log warnings and errors (reduces noise)
      # Options: DEBUG5, DEBUG1, INFO, NOTICE, WARNING, ERROR, LOG, FATAL, PANIC
      # Default: NOTICE (logs notices, warnings, errors) | Using: WARNING (only warnings and errors)
      - "log_min_messages=WARNING"
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    env_file:
      - .env
    volumes:
      - ./docker-data/backend/database/postgres_data:/var/lib/postgresql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
