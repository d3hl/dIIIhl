exporters:
  otlphttp:
    logs_endpoint: http://victorialogs:9428/insert/opentelemetry/v1/logs
receivers:
  filelog:
    include: [/var/lib/docker/containers/**/*.log]
    operators:
      - type: container
        format: docker
      - type: regex_parser
        parse_from: attributes["log.file.path"]
        regex: '^/var/lib/docker/containers/(?P<container_id>[a-f0-9]{64})/.*\.log$'
      - type: move
        from: attributes["container_id"]
        to: resource["container.id"]
    resource:
      region: sgp1
service:
  pipelines:
    logs:
      receivers: [filelog]
      exporters: [otlphttp]