exporters:
  loki:
    endpoint: http://victorialogs:9428/insert/jsonline?_stream_fields=stream,path&_msg_field=log&_time_field=date
receivers:
  filelog:
    include: [/var/lib/docker/containers/**/*.log]
    resource:
      region: us-east-1
service:
  pipelines:
    logs:
      receivers: [filelog]
      exporters: [loki]