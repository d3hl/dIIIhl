exporters:
  otlphttp:
    logs_endpoint: http://victorialogs:9428/insert/opentelemetry/v1/logs
receivers:
  filelog:
    include: [/var/lib/docker/containers/**/*.log]
    operators:
      - type: container
        format: docker
    resource:
      region: sgp1
service:
  pipelines:
    logs:
      receivers: [filelog]
      exporters: [otlphttp]